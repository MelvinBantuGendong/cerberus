<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2">
  <!-- Outer Shield -->
  <path d="M50 12 L82 22 C82 52 70 78 50 88 C30 78 18 52 18 22 Z" fill="#180b0e" stroke="#e11d48" stroke-width="3" />
  
  <!-- Central Glowing Eye/Core -->
  <circle cx="50" cy="46" r="10" fill="#e11d48" fill-opacity="0.2" stroke="#f43f5e" stroke-width="2" />
  <circle cx="50" cy="46" r="4" fill="#fb7185" />
  
  <!-- Three Cerberus Nodes (Left, Center, Right) representing the three heads/interceptors -->
  <!-- Left Head -->
  <line x1="50" y1="46" x2="32" y2="38" stroke="#f43f5e" stroke-dasharray="2,2" />
  <circle cx="32" cy="38" r="6" fill="#180b0e" stroke="#e11d48" stroke-width="2" />
  <circle cx="32" cy="38" r="2" fill="#fb7185" />
  
  <!-- Right Head -->
  <line x1="50" y1="46" x2="68" y2="38" stroke="#f43f5e" stroke-dasharray="2,2" />
  <circle cx="68" cy="38" r="6" fill="#180b0e" stroke="#e11d48" stroke-width="2" />
  <circle cx="68" cy="38" r="2" fill="#fb7185" />
  
  <!-- Threat Intercept Bar (Shield Core Guard) -->
  <path d="M35 62 Q50 68 65 62" stroke="#f43f5e" stroke-width="2" stroke-linecap="round" />
  <path d="M40 70 Q50 74 60 70" stroke="#fb7185" stroke-width="1.5" stroke-linecap="round" />
</svg>
